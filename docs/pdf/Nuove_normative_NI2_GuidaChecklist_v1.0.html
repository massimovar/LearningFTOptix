<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Checklist NIS2 - ASEM</title>
    <style>
        /* --- REGOLE BASE E ANIMAZIONI --- */
        html { scroll-behavior: smooth; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 1.0s ease-out forwards; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        /* --- CONTENITORI PRINCIPALI --- */
        .container {
            max-width: 900px;
            margin: 0 auto 30px auto; 
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }
        .checklist-container { display: none; }
        h1 { color: #0056b3; text-align: center; margin-bottom: 20px; }

        /* --- SELETTORE LINGUA TOP-RIGHT --- */
        .lang-switcher {
            text-align: right;
            margin-bottom: 10px;
        }
        .lang-switcher button {
            background: #eef2f5;
            border: 1px solid #ccc;
            padding: 5px 12px;
            margin-left: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            color: #555;
            transition: all 0.3s ease;
        }
        .lang-switcher button:hover {
            background: #dfe6eb;
        }
        .lang-switcher button.active {
            background: #0056b3;
            color: #fff;
            border-color: #0056b3;
        }

        /* --- SEZIONE FORM (INPUT UTENTE) --- */
        .form-section {
            background: #eef2f5;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group > label { font-weight: bold; display: block; margin-bottom: 16px; }
        
        /* Layout per i radio button e checkbox in alto */
        .radio-group, .checkbox-group { 
            display: flex; gap: 20px; flex-wrap: wrap; margin-left: 150px;
        }
        .radio-group label, .checkbox-group label { 
            font-weight: normal; display: flex; align-items: center; cursor: pointer; margin-bottom: 0; 
        }
        input[type="radio"], input[type="checkbox"] { 
            margin-right: 8px; cursor: pointer; 
        }

        /* --- BOTTONI --- */
        .btn-generate, .btn-print {
            display: block;
            margin: 0 auto;
            background: #0056b3;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-generate { margin-top: 24px; width: 40%; }
        .btn-generate:hover { background: #004494; }
        .btn-print { width: 40%; margin-top: 40px; }
        .btn-print:hover { background: #218838; }

        /* --- BOX INFORMATIVI E HEADER REPORT --- */
        .disclaimer {
            background-color: #e8f4fd;
            color: #2c3e50;
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 30px;
            font-size: 0.95em;
            border-left: 4px solid #31708f;
            line-height: 1.5;
        }

        /* --- STILI DELLE CATEGORIE --- */
        .category {
            margin-bottom: 35px;
            border-left: 4px solid #0056b3;
            padding-left: 20px;
            background: #fff;
        }
        .category h3 {
            margin-top: 0;
            color: #0056b3;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* --- I BOX NORMA E ASEM --- */
        .info-box {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.95em;
            line-height: 1.5;
        }
        .norma-box { 
            background-color: #f0f7ff; 
            border-left: 3px solid #66a3ff; 
        }
        .asem-box { 
            background-color: #f4f4f4; 
            border-left: 3px solid #888; 
        }
        .asem-box ul { margin-top: 8px; margin-bottom: 0; padding-left: 20px; }
        .asem-box li { margin-bottom: 8px; }

        /* --- CHECKLIST --- */
        .checklist-title {
            font-weight: bold;
            color: #2c3e50;
            margin-top: 25px;
            margin-bottom: 15px;
            display: block;
        }
        .check-item { 
            display: flex; 
            align-items: flex-start; 
            padding-left: 20px; 
            margin-bottom: 10px; 
        }
        .check-item input { 
            margin-top: 5px; 
            margin-right: 12px; 
            cursor: pointer; 
            flex-shrink: 0; 
        }
        .check-item label { 
            font-weight: normal; 
            margin-bottom: 0; 
            cursor: pointer; 
            display: block; 
        }
        .check-item span { 
            line-height: 1.5; 
            font-size: 0.95em; 
        }

        /* --- REGOLE DI STAMPA IN PDF --- */
        @media print {
            body { background-color: #fff; }
            .container { box-shadow: none; margin: 0; padding: 0; max-width: 100%; }
            .form-section, .btn-print, .btn-generate, .screen-only { display: none !important; }
            
            .norma-box, .asem-box, .disclaimer, .report-header > div { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            
            a { text-decoration: none !important; color: inherit !important; }
            
            .category, .info-box, .asem-box ul, .asem-box li { page-break-inside: auto; break-inside: auto; }
            .check-item { page-break-inside: avoid; break-inside: avoid; }
            h3, .checklist-title { page-break-after: avoid; break-after: avoid; }
        }
    </style>
</head>

    function getFileInfo() {
        try {
            const filename = decodeURIComponent(window.location.pathname.split('/').pop());
            const match = filename.match(/v\d+(?:\.\d+)?/i); 
            const ver = match ? match[0] : "vX";
            const date = new Date(document.lastModified).toLocaleDateString('it-IT');
            return { ver, date };
        } catch (e) {
            return { ver: "vX", date: "N/D" };
        }
    }

    function applyStyles(text) {
        let formatted = text.replace(/^([^:]+?)\s*:\s*/, '<strong>$1:</strong> ');
        formatted = formatted.replace(/<em>(?:Rif\.|Ref\.):\s*(.*?)<\/em>/g, function(match, docsContent) {
            let linkedDocs = docsContent.split(',').map(doc => {
                let docName = doc.trim();
                let url = docLinks[docName]; 
                if (url && url !== "") {
                    return `<a href="${url}" target="_blank" style="color: #0056b3; text-decoration: underline;">${docName}</a>`;
                } else {
                    return docName;
                }
            }).join(', ');
            let prefix = match.includes('Rif.') ? 'Rif.' : 'Ref.';
            return `<em>${prefix}: ${linkedDocs}</em>`;
        });
        return formatted;
    }

    function buildDataObj(hwSelected, swSelected, lang) {
        const dataObj = {
            Norm1: { title: NormTitles[lang].Norm1, norma: Statement[lang].Norm1, SecurityBaseline: [], SecurityChecklist: [] },
            Norm2: { title: NormTitles[lang].Norm2, norma: Statement[lang].Norm2, SecurityBaseline: [], SecurityChecklist: [] },
            Norm3: { title: NormTitles[lang].Norm3, norma: Statement[lang].Norm3, SecurityBaseline: [], SecurityChecklist: [] },
            Norm4: { title: NormTitles[lang].Norm4, norma: Statement[lang].Norm4, SecurityBaseline: [], SecurityChecklist: [] }
        };

        for (const [categoryKey, rules] of Object.entries(normsCapabilities)) {
            rules.forEach(rule => {
                const matchHw = rule.reqHw === 'ALL' || rule.reqHw.includes(hwSelected);
                const matchSw = !rule.reqSw || rule.reqSw.every(sw => swSelected.includes(sw));

                if (matchHw && matchSw) {
                    if (rule.SecurityBaseline) {
                        rule.SecurityBaseline.forEach(item => {
                            let text = typeof item === 'function' ? item(hwSelected, lang) : item[lang];
                            dataObj[categoryKey].SecurityBaseline.push(text);
                        });
                    }
                    if (rule.SecurityChecklist) {
                        rule.SecurityChecklist.forEach(item => {
                            let text = typeof item === 'function' ? item(hwSelected, lang) : item[lang];
                            dataObj[categoryKey].SecurityChecklist.push(text);
                        });
                    }
                }
            });
        }

        return dataObj;
    }

    function generateChecklist() {
        const lang = currentLang;

        const hwRadio = document.querySelector('input[name="hw"]:checked');

        const ubiqChecked = document.getElementById('sw-ubiquity').checked;
        const optixChecked = document.getElementById('sw-optix').checked;
        
        const swSelected = [];
        const swLabels = [];
        if (ubiqChecked) { swSelected.push('UBIQUITY'); swLabels.push("UBIQUITY"); }
        if (optixChecked) { swSelected.push('OPTIX'); swLabels.push("FactoryTalk Optix"); }

        const dataObj = buildDataObj(hwSelected, swSelected, lang);
        
        let configText = hwLabel;
        if (swLabels.length > 0) {
            configText += " + " + swLabels.join(" + ");
        }

        const container = document.getElementById('checklist-result');
        container.innerHTML = ''; 
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'report-header';
        headerDiv.innerHTML = `
            <h2 style="color: #0056b3; margin-bottom: 25px; font-size: 1.6em; text-align: center;">
                ${Labels[lang].ReportTitle}<br> ${configText}
            </h2>
            <div style="font-size: 0.95em; line-height: 1.5; text-align: justify; padding: 15px; border-left: 4px solid #0056b3; background-color: #f8f9fa; margin-bottom: 35px; border-radius: 6px;">
                <strong>${Labels[lang].IntroTitle}</strong><br>
                ${Labels[lang].IntroText}
            </div>
        `;
        container.appendChild(headerDiv);

        for (const [categoryKey, categoryData] of Object.entries(dataObj)) {
            const catDiv = document.createElement('div');
            catDiv.className = 'category';
            
            const title = document.createElement('h3');
            title.textContent = categoryData.title;
            catDiv.appendChild(title);

            const normaDiv = document.createElement('div');
            normaDiv.className = 'info-box norma-box';
            normaDiv.innerHTML = `<strong>${Labels[lang].NormaTitle}</strong><br><span>${categoryData.norma}</span>`;
            catDiv.appendChild(normaDiv);

            const asemDiv = document.createElement('div');
            asemDiv.className = 'info-box asem-box';
            let asemHtml = `<strong>${Labels[lang].AsemTitle}</strong><ul>`;
            categoryData.SecurityBaseline.forEach(point => {
                asemHtml += `<li>${applyStyles(point)}</li>`;
            });
            asemHtml += `</ul>`;
            asemDiv.innerHTML = asemHtml;
            catDiv.appendChild(asemDiv);

            const checkTitle = document.createElement('span');
            checkTitle.className = 'checklist-title';
            checkTitle.textContent = Labels[lang].ChecklistTitle;
            catDiv.appendChild(checkTitle);

            categoryData.SecurityChecklist.forEach((itemText, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'check-item';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `chk-${categoryKey}-${index}`;

                const label = document.createElement('label');
                label.setAttribute('for', checkbox.id);
                label.innerHTML = `<span>${applyStyles(itemText)}</span>`;

                itemDiv.appendChild(checkbox);
                itemDiv.appendChild(label);
                catDiv.appendChild(itemDiv);
            });

            container.appendChild(catDiv);
        }
        
        const footerDisclaimer = document.createElement('div');
        footerDisclaimer.style.marginTop = "50px";
        footerDisclaimer.style.paddingTop = "20px";
        footerDisclaimer.style.borderTop = "1px solid #ccc";
        footerDisclaimer.style.fontSize = "0.85em";
