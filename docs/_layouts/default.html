<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #fafbfc;
      --bg-card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #4a5568;
      --muted: #718096;
      --border: #e2e8f0;
      --accent: #0066cc;
      --accent-hover: #0052a3;
      --accent-light: #e6f2ff;
      --accent-glow: rgba(0, 102, 204, 0.12);
      --surface: #f7fafc;
      --card-shadow: 0 1px 3px rgba(0, 0, 0, .04), 0 1px 2px rgba(0, 0, 0, .06);
      --card-shadow-hover: 0 10px 40px rgba(0, 0, 0, .08), 0 2px 8px rgba(0, 0, 0, .04);
      --transition-fast: 0.15s ease;
      --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 12px;
      --radius-sm: 8px;
      --warning-bg: #fffbeb;
      --warning-border: #fcd34d;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --bg-card: #161b22;
        --text: #e6edf3;
        --text-secondary: #8b949e;
        --muted: #8b949e;
        --border: #30363d;
        --accent: #58a6ff;
        --accent-hover: #79b8ff;
        --accent-light: #1a3a5c;
        --accent-glow: rgba(88, 166, 255, 0.15);
        --surface: #21262d;
        --card-shadow: 0 1px 3px rgba(0, 0, 0, .2);
        --card-shadow-hover: 0 10px 40px rgba(0, 0, 0, .3);
        --warning-bg: #3b2f00;
        --warning-border: #d97706;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html { scroll-behavior: smooth; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wrapper { 
      max-width: 940px; 
      margin: 0 auto; 
      padding: 40px 24px;
      animation: fadeIn 0.5s ease-out;
    }

    /* Back link */
    .back { 
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px; 
      color: var(--accent); 
      text-decoration: none; 
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--bg-card);
      transition: var(--transition-smooth);
    }
    .back:hover { 
      background: var(--accent-light);
      border-color: var(--accent);
      transform: translateX(-2px);
    }

    /* Typography */
    h1, h2, h3, h4 { color: var(--text); margin-top: 32px; margin-bottom: 16px; font-weight: 600; }
    h1 { font-size: 28px; border-bottom: 1px solid var(--border); padding-bottom: 12px; letter-spacing: -0.5px; }
    h2 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; letter-spacing: -0.3px; }
    h3 { font-size: 18px; margin-top: 24px; }
    h4 { font-size: 16px; }
    p { margin-bottom: 16px; color: var(--text); }
    ul, ol { margin: 12px 0 16px 24px; color: var(--text); }
    li { margin-bottom: 6px; }

    /* Links */
    a { color: var(--accent); text-decoration: none; transition: var(--transition-fast); }
    a:hover { color: var(--accent-hover); }

    /* Focus states */
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Code */
    code { 
      background: var(--surface); 
      color: var(--accent); 
      padding: 3px 8px; 
      border-radius: 6px; 
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
    }
    pre { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      padding: 20px; 
      overflow-x: auto; 
      margin: 16px 0; 
    }
    pre code { background: none; padding: 0; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; margin: 20px 0; border-radius: var(--radius); overflow: hidden; }
    th, td { padding: 12px 16px; border: 1px solid var(--border); text-align: left; }
    th { background: var(--surface); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
    tr:hover td { background: var(--accent-light); }

    /* Blockquotes */
    blockquote { 
      border-left: 4px solid var(--accent); 
      padding: 12px 20px; 
      margin: 16px 0; 
      color: var(--muted); 
      background: var(--surface); 
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0; 
    }

    /* Horizontal rule */
    hr { 
      border: none; 
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 32px 0; 
    }

    /* Inline tags */
    .tag { 
      background: var(--accent-light); 
      color: var(--accent); 
      padding: 3px 10px; 
      border-radius: 16px; 
      font-size: 12px; 
      font-weight: 500;
      margin: 2px 3px; 
      display: inline-block; 
    }

    /* Search box */
    .search-box { 
      width: 100%; 
      padding: 12px 16px; 
      margin-bottom: 16px; 
      border: 1px solid var(--border); 
      border-radius: var(--radius-sm); 
      font-size: 15px; 
      background: var(--bg-card); 
      color: var(--text); 
      outline: none; 
      box-sizing: border-box;
      transition: var(--transition-fast);
    }
    .search-box:focus { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 3px var(--accent-glow); 
    }

    /* Video table */
    .vid-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .vid-table th, .vid-table td { padding: 12px 14px; border: 1px solid var(--border); text-align: left; }
    .vid-table th { 
      background: var(--surface); 
      cursor: pointer; 
      user-select: none; 
      white-space: nowrap;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      transition: var(--transition-fast);
    }
    .vid-table th:hover { background: var(--accent-light); }
    .vid-table th .arrow { font-size: 10px; margin-left: 6px; opacity: .4; }
    .vid-table th.sorted .arrow { opacity: 1; }
    .vid-table tr:hover td { background: var(--accent-light); }
    .vid-table td:nth-child(1) { text-align: center; width: 40px; }
    .vid-table td:nth-child(4) { text-align: center; white-space: nowrap; }
    .no-results { text-align: center; padding: 24px; color: var(--muted); font-style: italic; }

    /* Footer */
    .page-footer { 
      margin-top: 48px; 
      padding-top: 24px; 
      border-top: 1px solid var(--border); 
      text-align: center; 
      color: var(--muted); 
      font-size: 13px; 
    }
    .page-footer a { 
      color: var(--accent);
      font-weight: 500;
    }
    .page-footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 768px) {
      .wrapper { padding: 24px 16px; }
      h1 { font-size: 24px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <a class="back" href="{{ '/' | relative_url }}">← Back to Home</a>
    {{ content }}
    <div class="page-footer">
      <a href="{{ '/' | relative_url }}">Home</a> · <a href="https://github.com/massimovar/LearningFTOptix">GitHub Repo</a>
    </div>
  </div>
</body>
</html>
