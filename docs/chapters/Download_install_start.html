<style>
  .section-intro { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
  .step-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin: 28px 0; }
  .step-card { 
    border: 1px solid var(--border); 
    border-radius: var(--radius); 
    padding: 28px; 
    background: var(--bg-card); 
    box-shadow: var(--card-shadow); 
    transition: var(--transition-smooth); 
    text-align: center; 
  }
  .step-card:hover { 
    border-color: var(--accent); 
    box-shadow: var(--card-shadow-hover);
    transform: translateY(-2px);
  }
  .step-card .step-num { 
    display: inline-flex; 
    align-items: center; 
    justify-content: center; 
    width: 44px; 
    height: 44px; 
    border-radius: 50%; 
    background: var(--accent-light); 
    color: var(--accent); 
    font-weight: 700; 
    font-size: 18px; 
    margin-bottom: 16px; 
  }
  .step-card h3 { 
    font-size: 17px; 
    font-weight: 600;
    margin: 0 0 12px; 
    border: none; 
    padding: 0; 
  }
  .step-card a { 
    color: var(--text); 
    text-decoration: none; 
    font-size: 14px;
    font-weight: 500;
    transition: var(--transition-fast);
  }
  .step-card a:hover { color: var(--accent); }
  .prereq { 
    border: 1px solid var(--warning-border); 
    border-radius: var(--radius); 
    padding: 18px 24px; 
    background: var(--warning-bg); 
    margin-bottom: 28px; 
    font-size: 14px; 
  }
  .prereq a { color: var(--accent); font-weight: 500; }
</style>
